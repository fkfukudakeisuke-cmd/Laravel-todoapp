services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    # ⬇️ app の方に ports を追加し、5173 をこちらに繋ぎます！
    ports:
      - "5173:5173" 
    volumes:
      - ./src:/var/www
      - ./database/database.sqlite:/var/www/database/database.sqlite
    networks:
      - laravel

  web:
    image: nginx:alpine
    container_name: laravel-web
    ports:
      - "8080:80"   # ⚠️ web 側は 8080 だけにします（5173は削除）
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
    driver: bridge